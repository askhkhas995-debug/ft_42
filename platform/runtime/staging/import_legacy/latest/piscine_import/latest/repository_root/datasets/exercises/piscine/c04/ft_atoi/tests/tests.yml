cases:
- id: simple_positive
  argv:
  - '42'
  expected_stdout: '42

    '
  expected_stderr: ''
  expected_exit_code: 0
- id: simple_negative
  argv:
  - '-42'
  expected_stdout: '-42

    '
  expected_stderr: ''
  expected_exit_code: 0
- id: whitespace
  argv:
  - ' \t\n\v\f\r 42'
  expected_stdout: '42

    '
  expected_stderr: ''
  expected_exit_code: 0
- id: multiple_signs
  argv:
  - --42
  expected_stdout: '0

    '
  expected_stderr: ''
  expected_exit_code: 0
- id: max_int
  argv:
  - '2147483647'
  expected_stdout: '2147483647

    '
  expected_stderr: ''
  expected_exit_code: 0
- id: min_int
  argv:
  - '-2147483648'
  expected_stdout: '-2147483648

    '
  expected_stderr: ''
  expected_exit_code: 0
