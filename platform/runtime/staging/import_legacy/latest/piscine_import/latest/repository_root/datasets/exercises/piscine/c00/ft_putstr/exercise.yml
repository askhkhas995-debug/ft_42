learning:
  visible_edge_cases:
    - id: empty-string
      prompt: Verify the function handles an empty string without printing extra bytes.
      reveal_before_submit: true
    - id: stop-at-null
      prompt: Observe that output must stop at the first null terminator.
      reveal_before_submit: true
  hints:
    - id: null-terminator-loop
      prompt: "Iterate until the current character is `\\0`, then stop writing."
      unlock_after_attempts: 1
  observation:
    enabled: true
    prompts:
      - Compare the emitted bytes with the expected string length.
      - Watch for off-by-one output caused by moving past the null terminator.
